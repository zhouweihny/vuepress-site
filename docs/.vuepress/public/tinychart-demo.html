<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyChart Demo - ECharts 图表在线演示</title>
  <script src="./libs/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      overflow: hidden;
    }
    .container { display: flex; height: 100vh; }

    /* 左侧导航 */
    .sidebar {
      width: 250px;
      background: #252526;
      border-right: 1px solid #3e3e42;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-title {
      padding: 15px 20px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      background: #1e1e1e;
      border-bottom: 1px solid #3e3e42;
    }
    .nav-item {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 13px;
      color: #969696;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: #2a2d2e; color: #fff; }
    .nav-item.active {
      background: #1e1e1e;
      color: #007acc;
      border-left-color: #007acc;
    }
    .nav-group {
      padding: 8px 20px;
      font-size: 12px;
      color: #666;
      background: #252526;
      border-top: 1px solid #3e3e42;
      border-bottom: 1px solid #3e3e42;
      margin-top: 5px;
    }

    /* 中间代码区 */
    .code-panel {
      width: 35%;
      background: #252526;
      border-right: 1px solid #3e3e42;
      display: flex;
      flex-direction: column;
    }
    .code-header {
      padding: 10px 20px;
      background: #1e1e1e;
      border-bottom: 1px solid #3e3e42;
      font-size: 13px;
      color: #969696;
    }
    .code-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .code-area textarea {
      width: 100%;
      height: 100%;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      padding: 20px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    /* 右侧预览区 */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .preview-header {
      padding: 10px 20px;
      background: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }
    .preview-desc {
      padding: 8px 20px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      font-size: 12px;
      color: #666;
    }
    .chart-container {
      flex: 1;
      position: relative;
      background: #fff;
    }
    .chart-container #chart {
      width: 100%;
      height: 100%;
    }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e1e1e; }
    ::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #4e4e4e; }

    /* 错误提示 */
    .error {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #f44336;
      color: white;
      padding: 12px 20px;
      border-radius: 4px;
      display: none;
      z-index: 1000;
      max-width: 80%;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 左侧导航 -->
    <div class="sidebar">
      <div class="sidebar-title">📊 ECharts 示例集</div>
      <div id="nav-container"></div>
    </div>

    <!-- 中间代码 -->
    <div class="code-panel">
      <div class="code-header">
        <span id="chart-name">示例代码</span>
      </div>
      <div class="code-area">
        <textarea id="code-editor" spellcheck="false"></textarea>
      </div>
    </div>

    <!-- 右侧预览 -->
    <div class="preview-panel">
      <div class="preview-header" id="preview-title">图表预览</div>
      <div class="preview-desc" id="preview-desc">选择一个图表查看效果</div>
      <div class="chart-container">
        <div id="chart"></div>
      </div>
    </div>
  </div>

  <div class="error" id="error"></div>

    let chart = null;
    let currentKey = null;

    function initNav() {
      const navContainer = document.getElementById('nav-container');
      Object.keys(CHART_TYPES).forEach((category) => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'nav-group';
        groupDiv.textContent = category;
        navContainer.appendChild(groupDiv);

        Object.keys(CHART_TYPES[category].items).forEach((itemName) => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'nav-item';
          itemDiv.dataset.category = category;
          itemDiv.dataset.item = itemName;
          itemDiv.textContent = itemName;
          itemDiv.addEventListener('click', () => selectChart(category, itemName));
          navContainer.appendChild(itemDiv);
        });
      });
    }

    function selectChart(category, itemName) {
      const config = CHART_TYPES[category].items[itemName];
      const key = category + '|' + itemName;

      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.querySelectorAll(`[data-category="${category}"][data-item="${itemName}"]`).forEach(el => el.classList.add('active'));

      document.getElementById('chart-name').textContent = itemName;
      document.getElementById('preview-title').textContent = config.title || itemName;
      document.getElementById('preview-desc').textContent = CHART_TYPES[category].desc;
      document.getElementById('code-editor').value = config.code;

      currentKey = key;
      renderChart();
    }

    function renderChart() {
      if (!currentKey) return;
      const [category, itemName] = currentKey.split('|');
      const config = CHART_TYPES[category].items[itemName];
      const editor = document.getElementById('code-editor');
      let userCode = editor.value;

      try {
        const fn = new Function(userCode + '\nreturn option;');
        const option = fn();

        if (!chart) {
          chart = echarts.init(document.getElementById('chart'));
        }
        chart.setOption(option, true);
        hideError();
      } catch (e) {
        showError('代码错误: ' + e.message);
        console.error(e);
      }
    }

    function debounce(fn, delay) {
      let timer = null;
      return function () {
        clearTimeout(timer);
        timer = setTimeout(fn, delay);
      };
    }

    function showError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
    }

    function hideError() {
      document.getElementById('error').style.display = 'none';
    }

    initNav();

    const firstCategory = Object.keys(CHART_TYPES)[0];
    const firstItem = Object.keys(CHART_TYPES[firstCategory].items)[0];
    selectChart(firstCategory, firstItem);

    document.getElementById('code-editor').addEventListener('input', debounce(renderChart, 500));

    window.addEventListener('resize', () => {
      chart && chart.resize();
    });
  </script>
